name: Build PDFs from Markdown

on:
  push:
    branches: [main]

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # required to push the PDF commit back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install pandoc + LaTeX + Noto fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-lang-czechslovak \
            texlive-latex-extra \
            fonts-noto \
            fonts-noto-extra

      - name: Convert okruhy/ to PDF
        run: |
          mkdir -p pdf/okruhy
          for f in okruhy/*.md; do
            name=$(basename "${f%.md}")
            echo "Converting $f..."
            pandoc "$f" \
              --pdf-engine=xelatex \
              --resource-path=. \
              --include-in-header=.github/pandoc-header.tex \
              -V geometry:margin=2.5cm \
              -V lang=cs \
              -V mainfont="Noto Serif" \
              -V monofont="Noto Sans Mono" \
              -o "pdf/okruhy/${name}.pdf" \
            || echo "⚠ Failed: $f"
          done

      - name: Convert synthesis/ to PDF
        run: |
          mkdir -p pdf/synthesis
          for f in synthesis/*.md; do
            name=$(basename "${f%.md}")
            echo "Converting $f..."
            pandoc "$f" \
              --pdf-engine=xelatex \
              --resource-path=. \
              --include-in-header=.github/pandoc-header.tex \
              -V geometry:margin=2.5cm \
              -V lang=cs \
              -V mainfont="Noto Serif" \
              -V monofont="Noto Sans Mono" \
              -o "pdf/synthesis/${name}.pdf" \
            || echo "⚠ Failed: $f"
          done

      - name: Commit PDFs to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdf/
          git diff --cached --quiet || git commit -m "ci: rebuild PDFs [skip ci]"
          git push
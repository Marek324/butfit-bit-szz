name: Build PDFs from Markdown

on:
  push:
    branches: [main]

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install pandoc + LaTeX (with Czech support)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-lang-czechslovak \
            texlive-latex-extra

      - name: Convert okruhy/ to PDF
        run: |
          mkdir -p pdf/okruhy
          for f in okruhy/*.md; do
            name=$(basename "${f%.md}")
            echo "Converting $f..."
            pandoc "$f" \
              --pdf-engine=xelatex \
              --resource-path=. \
              -V geometry:margin=2.5cm \
              -V lang=cs \
              -V mainfont="DejaVu Serif" \
              -o "pdf/okruhy/${name}.pdf" \
            || echo "⚠ Failed: $f"
          done

      - name: Convert synthesis/ to PDF
        run: |
          mkdir -p pdf/synthesis
          for f in synthesis/*.md; do
            name=$(basename "${f%.md}")
            echo "Converting $f..."
            pandoc "$f" \
              --pdf-engine=xelatex \
              --resource-path=. \
              -V geometry:margin=2.5cm \
              -V lang=cs \
              -V mainfont="DejaVu Serif" \
              -o "pdf/synthesis/${name}.pdf" \
            || echo "⚠ Failed: $f"
          done

      - name: Upload PDFs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: szz-pdfs
          path: pdf/
          retention-days: 30
